services:
  - type: web
    name: bharat
    plan: free
    env: docker
    dockerfilePath: Dockerfile
    repo: https://github.com/Bharatkumar17/Bkpt
    branch: main
    autoDeploy: false
    envVars:
      - key: BOT_TOKEN
        sync: true
      - key: API_ID
        sync: true
      - key: API_HASH
        sync: true
      #- key: WEBHOOK
        #sync: false
      - key: PORT
        value: 8000  # Default port value, update if needed
